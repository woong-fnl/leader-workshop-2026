<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0D1B2A" />
  <title>2026 에프앤엘 리더십 워크숍</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 공지 띠 -->
  <div id="notice-bar" role="status"></div>

  <!-- 헤더 -->
  <header>
    <div class="nav-inner">

      <!-- 로고: images/logo.png 가 있으면 이미지, 없으면 텍스트 표시 -->
      <a class="nav-logo" href="#top" aria-label="홈으로">
        <img src="images/logo.png" alt="에프앤엘" class="logo-img"
             onerror="this.hidden=true;this.nextElementSibling.hidden=false">
        <span class="logo-fallback" hidden>에프앤엘</span>
      </a>

      <!-- Day 탭 -->
      <div class="day-switcher" role="tablist" id="day-tabs" aria-label="날짜 선택"></div>

      <!-- 검색 버튼 -->
      <button class="search-btn" id="search-open-btn" aria-label="검색 열기" aria-expanded="false">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span class="search-btn-text">검색</span>
      </button>

    </div>
  </header>

  <!-- 검색 패널 (header 바로 아래 fixed) -->
  <div class="search-panel" id="search-panel" role="search" aria-label="일정 검색">
    <div class="search-input-row">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"
           aria-hidden="true" style="flex-shrink:0;color:var(--text-muted)">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="search" class="search-input" id="search-input"
             placeholder="검색 (예: 점심, 흡연, 포유포레, 이동)" autocomplete="off" />
      <button class="search-close-btn" id="search-close-btn" aria-label="검색 닫기">✕</button>
    </div>
    <div class="search-results" id="search-results" aria-live="polite"></div>
  </div>

  <main id="top">

    <!-- 히어로 -->
    <section id="hero">
      <div class="hero-inner">
        <p class="hero-kicker">FNL Leadership Workshop</p>
        <h1 class="hero-title" id="hero-title"></h1>
        <p class="hero-subtitle" id="hero-subtitle"></p>
        <div class="hero-chips">
          <span class="chip" id="chip-date">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <span></span>
          </span>
          <span class="chip" id="chip-time">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
            <span></span>
          </span>
          <a class="chip" id="chip-venue" href="#" target="_blank" rel="noopener">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
            <span></span>
          </a>
        </div>
      </div>
    </section>

    <!-- Day 패널 -->
    <div class="day-panels-wrap" id="day-panels"></div>

  </main>

  <footer>
    <p><strong id="footer-title"></strong></p>
    <p id="footer-info"></p>
  </footer>

  <script src="data.js"></script>
  <script>
  (() => {
    // ── XSS 방지 헬퍼 ─────────────────────────────────────────
    const escHtml = s => String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    const escAttr = s => String(s).replace(/[^a-zA-Z0-9_\-.:\/\?=%&+#]/g,
      c => `&#${c.charCodeAt(0)};`);

    // ── 메타 ─────────────────────────────────────────────────
    document.title = EVENT.title;
    const e = id => document.getElementById(id);

    if (EVENT.notice) e('notice-bar').textContent = '📌 ' + EVENT.notice;

    // ── 히어로 ────────────────────────────────────────────────
    e('hero-title').textContent = EVENT.title;
    e('hero-subtitle').textContent = EVENT.subtitle;
    e('chip-date').querySelector('span').textContent = EVENT.date;
    e('chip-time').querySelector('span').textContent = EVENT.time;
    const venueChip = e('chip-venue');
    venueChip.querySelector('span').textContent = EVENT.venue;
    venueChip.href = 'https://map.naver.com/v5/search/' + encodeURIComponent(EVENT.address);

    // ── 푸터 ─────────────────────────────────────────────────
    e('footer-title').textContent = EVENT.title;
    e('footer-info').textContent = EVENT.date + '  ·  ' + EVENT.venue;

    // ── 타임라인 빌더 ─────────────────────────────────────────
    const TYPE_CLS = {
      keynote: 'is-keynote', activity: 'is-activity',
      networking: 'is-networking', break: 'is-break', move: 'is-move',
    };
    const PIN_SVG = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
        stroke-linejoin="round" aria-hidden="true">
        <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
        <circle cx="12" cy="10" r="3"/></svg>`;

    function buildTimeline(items) {
      const ol = document.createElement('ol');
      ol.className = 'timeline';
      items.forEach(item => {
        const li = document.createElement('li');
        li.className = 'timeline-item ' + (TYPE_CLS[item.type] || '');
        const desc = item.desc
          ? `<p class="tl-desc">${escHtml(item.desc)}</p>` : '';
        const notePart = item.note
          ? `<span class="tl-note">${escHtml(item.note)}</span>` : '';
        const locPart = item.location && item.locationUrl
          ? `<a class="tl-location" href="${escAttr(item.locationUrl)}"
               target="_blank" rel="noopener noreferrer">
               ${PIN_SVG}${escHtml(item.location)}
             </a>`
          : item.location
            ? `<span class="tl-note">${escHtml(item.location)}</span>` : '';
        const meta = (notePart || locPart)
          ? `<div class="tl-meta">${notePart}${locPart}</div>` : '';
        li.innerHTML = `
          <div class="tl-time" aria-hidden="true">${escHtml(item.time)}</div>
          <div class="tl-body">
            <p class="tl-title">
              <span class="sr-only">${escHtml(item.time)} — </span>${escHtml(item.title)}
            </p>${desc}${meta}
          </div>`;
        ol.appendChild(li);
      });
      return ol;
    }

    // ── Day 탭 + 패널 렌더링 ──────────────────────────────────
    const tabBar   = e('day-tabs');
    const panelWrap = e('day-panels');
    let activeDay  = 0;

    EVENT.days.forEach((day, i) => {
      // 탭 버튼
      const btn = document.createElement('button');
      btn.className = 'day-tab';
      btn.setAttribute('role', 'tab');
      btn.setAttribute('aria-selected', i === 0 ? 'true' : 'false');
      btn.setAttribute('aria-controls', `panel-${i}`);
      btn.id = `tab-${i}`;
      btn.innerHTML = `<span class="day-tab-label">${escHtml(day.label)}</span>
                       <span class="day-tab-date">${escHtml(day.date)}</span>`;
      btn.addEventListener('click', () => switchDay(i));
      tabBar.appendChild(btn);

      // 패널
      const panel = document.createElement('div');
      panel.className = 'day-panel' + (i === 0 ? ' is-active' : '');
      panel.id = `panel-${i}`;
      panel.setAttribute('role', 'tabpanel');
      panel.setAttribute('aria-labelledby', `tab-${i}`);

      const inner = document.createElement('div');
      inner.className = 'day-panel-inner';

      const heading = document.createElement('div');
      heading.className = 'day-heading';
      heading.innerHTML = `<span class="day-heading-label">${escHtml(day.label)}</span>
                           <span class="day-heading-date">${escHtml(day.date)}</span>`;
      inner.appendChild(heading);
      inner.appendChild(buildTimeline(day.items));
      panel.appendChild(inner);
      panelWrap.appendChild(panel);
    });

    function switchDay(idx) {
      if (idx === activeDay) return;
      activeDay = idx;
      tabBar.querySelectorAll('.day-tab').forEach((b, i) => {
        b.setAttribute('aria-selected', i === idx ? 'true' : 'false');
      });
      panelWrap.querySelectorAll('.day-panel').forEach((p, i) => {
        const wasActive = p.classList.contains('is-active');
        p.classList.toggle('is-active', i === idx);
        // 재-애니메이션 트리거
        if (i === idx && !wasActive) {
          p.style.animation = 'none';
          requestAnimationFrame(() => { p.style.animation = ''; });
        }
      });
    }

    // ── 검색 ─────────────────────────────────────────────────
    const searchPanel    = e('search-panel');
    const searchInput    = e('search-input');
    const searchResults  = e('search-results');
    const openBtn        = e('search-open-btn');
    const closeBtn       = e('search-close-btn');

    function openSearch() {
      searchPanel.classList.add('is-open');
      openBtn.setAttribute('aria-expanded', 'true');
      searchInput.focus();
    }

    function closeSearch() {
      searchPanel.classList.remove('is-open');
      openBtn.setAttribute('aria-expanded', 'false');
      searchInput.value = '';
      searchResults.innerHTML = '';
      openBtn.focus();
    }

    openBtn.addEventListener('click', openSearch);
    closeBtn.addEventListener('click', closeSearch);
    document.addEventListener('keydown', ev => {
      if (ev.key === 'Escape' && searchPanel.classList.contains('is-open')) closeSearch();
    });

    // 검색 실행 (디바운스 80ms)
    let debounceTimer;
    searchInput.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => renderSearchResults(searchInput.value), 80);
    });

    function normalizeQuery(q) {
      return q.trim().toLowerCase();
    }

    function matchText(text, q) {
      return text.toLowerCase().includes(q);
    }

    function renderSearchResults(rawQuery) {
      const q = normalizeQuery(rawQuery);
      if (!q) { searchResults.innerHTML = ''; return; }

      const scheduleHits = [];
      EVENT.days.forEach((day, dayIdx) => {
        day.items.forEach(item => {
          const haystack = [item.title, item.desc, item.note, item.location].join(' ');
          if (matchText(haystack, q)) {
            scheduleHits.push({ day, dayIdx, item });
          }
        });
      });

      const tipHits = (EVENT.tips || []).filter(tip => {
        const kwMatch = tip.keywords.some(k => k.toLowerCase().includes(q) || q.includes(k.toLowerCase()));
        const textMatch = matchText(tip.title + ' ' + tip.desc, q);
        return kwMatch || textMatch;
      });

      if (!scheduleHits.length && !tipHits.length) {
        searchResults.innerHTML = `<div class="search-empty">
          "<strong>${escHtml(rawQuery)}</strong>" 에 대한 결과가 없습니다.
        </div>`;
        return;
      }

      const wrap = document.createElement('div');
      wrap.className = 'search-results-inner';

      if (scheduleHits.length) {
        const label = document.createElement('p');
        label.className = 'search-section-label';
        label.textContent = '일정';
        wrap.appendChild(label);

        scheduleHits.forEach(({ day, dayIdx, item }) => {
          const a = document.createElement('div');
          a.className = 'search-result-item';
          a.setAttribute('role', 'button');
          a.setAttribute('tabindex', '0');
          const badgeCls = dayIdx === 0 ? 'day1' : 'day2';
          const descText = item.desc ? item.desc.replace(/\n/g, ' ').slice(0, 60) + (item.desc.length > 60 ? '…' : '') : (item.note || '');
          a.innerHTML = `
            <div class="search-result-meta">
              <span class="search-result-title">${escHtml(item.title)}</span>
              ${descText ? `<span class="search-result-desc">${escHtml(descText)}</span>` : ''}
              <span class="search-result-time">${escHtml(item.time)}</span>
            </div>
            <span class="search-badge ${badgeCls}">${escHtml(day.label)}</span>`;
          // 클릭 시 해당 Day로 이동
          const handler = () => {
            switchDay(dayIdx);
            closeSearch();
            setTimeout(() => {
              document.getElementById(`panel-${dayIdx}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 50);
          };
          a.addEventListener('click', handler);
          a.addEventListener('keydown', ev => { if (ev.key === 'Enter') handler(); });
          wrap.appendChild(a);
        });
      }

      if (tipHits.length) {
        const label = document.createElement('p');
        label.className = 'search-section-label';
        label.textContent = '안내';
        wrap.appendChild(label);

        tipHits.forEach(tip => {
          const div = document.createElement('div');
          div.className = 'search-result-item';
          div.innerHTML = `
            <div class="search-result-meta">
              <span class="search-result-title">${escHtml(tip.title)}</span>
              <span class="search-result-desc">${escHtml(tip.desc)}</span>
            </div>
            <span class="search-badge tip">안내</span>`;
          wrap.appendChild(div);
        });
      }

      searchResults.innerHTML = '';
      searchResults.appendChild(wrap);
    }

  })();
  </script>

</body>
</html>
