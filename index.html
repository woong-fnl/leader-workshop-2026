<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0F2238" />
  <title>2026 에프앤엘 리더십 워크숍</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══ PIN 게이트 ════════════════════════════════════════════ -->
  <div class="pin-gate" id="pin-gate" role="dialog" aria-modal="true" aria-label="접근 인증">
    <div class="pin-box">
      <div class="pin-logo-wrap">
        <img src="images/logo.png" alt="에프앤엘" class="pin-logo-img"
             onerror="this.hidden=true;this.nextElementSibling.hidden=false">
        <span class="pin-logo-text" hidden>에프앤엘</span>
      </div>
      <p class="pin-title">2026 에프앤엘<br>리더십 워크숍</p>
      <p class="pin-sub">참석자 전용 페이지입니다</p>
      <div class="pin-input-wrap">
        <input class="pin-input" id="pin-input" type="password"
               maxlength="6" inputmode="numeric" pattern="[0-9]*"
               placeholder="· · · · · ·" autocomplete="off"
               aria-label="PIN 번호 입력" />
        <p class="pin-error" id="pin-error" aria-live="polite"></p>
      </div>
      <button class="pin-btn" id="pin-submit">입장하기</button>
    </div>
  </div>

  <div id="notice-bar" role="status"></div>

  <!-- ══ 사이드바 (데스크탑) ══════════════════════════════════ -->
  <aside class="sidebar" aria-label="내비게이션">
    <a class="sidebar-logo" href="#top" aria-label="홈">
      <img src="images/logo.png" alt="에프앤엘" class="sidebar-logo-img"
           onerror="this.hidden=true;this.nextElementSibling.hidden=false">
      <span class="sidebar-logo-text" hidden>에프앤엘</span>
    </a>
    <nav class="sidebar-nav" id="sidebar-tabs" role="tablist" aria-label="메뉴"></nav>
    <hr class="sidebar-hr" />
    <button class="sidebar-search-btn" id="search-open-btn" aria-label="검색 열기">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      검색
    </button>
  </aside>

  <!-- ══ 하단 탭바 (모바일) ═══════════════════════════════════ -->
  <nav class="mobile-tabs" id="mobile-tabs" aria-label="메뉴"></nav>

  <!-- ══ 검색 오버레이 ════════════════════════════════════════ -->
  <div class="search-overlay" id="search-overlay" role="search" aria-label="검색">
    <div class="search-top-bar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input class="search-input" id="search-input" type="search"
             placeholder="검색 (예: 점심, 이름, 흡연, 포유포레)"
             autocomplete="off" aria-label="검색어 입력" />
      <button class="search-close-btn" id="search-close-btn" aria-label="검색 닫기">✕</button>
    </div>
    <div class="search-results" id="search-results" aria-live="polite"></div>
  </div>

  <!-- ══ 메인 콘텐츠 ══════════════════════════════════════════ -->
  <main id="top">

    <section id="hero">
      <div class="hero-inner">
        <div class="hero-logo-mobile" aria-hidden="true">
          <img src="images/logo.png" alt="" class="hero-logo-mobile-img"
               onerror="this.hidden=true;this.nextElementSibling.hidden=false">
          <span class="hero-logo-mobile-text" hidden>에프앤엘</span>
        </div>
        <p class="hero-kicker">F&amp;L Leadership Workshop</p>
        <h1 class="hero-title" id="hero-title"></h1>
        <p class="hero-subtitle" id="hero-subtitle"></p>
        <div class="hero-chips">
          <span class="chip" id="chip-date">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <span></span>
          </span>
          <span class="chip" id="chip-time">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
            <span></span>
          </span>
          <a class="chip" id="chip-venue" href="#" target="_blank" rel="noopener">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
            </svg>
            <span></span>
          </a>
        </div>
      </div>
    </section>

    <!-- 패널 래퍼 -->
    <div class="panels-wrap" id="panels"></div>

  </main>

  <footer>
    <p><strong id="footer-title"></strong></p>
    <p id="footer-info"></p>
  </footer>

  <!-- ══ 참석자 상세 모달 ══════════════════════════════════════ -->
  <div class="att-modal" id="att-modal" role="dialog" aria-modal="true" aria-labelledby="att-modal-name">
    <div class="att-modal-bd" id="att-modal-bd"></div>
    <div class="att-modal-sheet">
      <div class="att-modal-handle" aria-hidden="true"></div>
      <button class="att-modal-close" id="att-modal-close" aria-label="닫기">
        <i class="ti ti-x" aria-hidden="true"></i>
      </button>
      <div class="att-modal-body">
        <div class="att-modal-avatar" id="att-modal-avatar"></div>
        <p  class="att-modal-name"  id="att-modal-name"></p>
        <span class="att-modal-badge" id="att-modal-badge"></span>
        <p  class="att-modal-team"  id="att-modal-team"></p>
        <span class="att-modal-room" id="att-modal-room"></span>
        <a  class="att-modal-phone" id="att-modal-phone" href="#"></a>
      </div>
    </div>
  </div>

  <!-- ══ 타임라인 일정 상세 모달 ═══════════════════════════════ -->
  <div class="tl-detail-modal" id="tl-detail-modal" role="dialog" aria-modal="true" aria-labelledby="tl-dm-title">
    <div class="tl-detail-bd" id="tl-detail-bd"></div>
    <div class="tl-detail-sheet">
      <div class="tl-detail-handle" aria-hidden="true"></div>
      <button class="tl-detail-close" id="tl-detail-close" aria-label="닫기">
        <i class="ti ti-x" aria-hidden="true"></i>
      </button>
      <div class="tl-detail-body">
        <p class="tl-dm-time"  id="tl-dm-time"></p>
        <p class="tl-dm-title" id="tl-dm-title"></p>
        <p class="tl-dm-desc"  id="tl-dm-desc"></p>
        <p class="tl-dm-note"  id="tl-dm-note"></p>
        <div class="tl-dm-loc-wrap" id="tl-dm-loc-wrap"></div>
        <div class="tl-dm-actions" id="tl-dm-actions"></div>
      </div>
    </div>
  </div>

  <!-- ══ 자리배치도 모달 ══════════════════════════════════════ -->
  <div class="seat-modal" id="seat-modal" role="dialog" aria-modal="true" aria-label="자리배치도">
    <div class="seat-modal-bd" id="seat-modal-bd"></div>
    <div class="seat-modal-sheet">
      <div class="seat-modal-header">
        <span class="seat-modal-title">자리배치도</span>
        <button class="seat-modal-close" id="seat-modal-close" aria-label="닫기">
          <i class="ti ti-x" aria-hidden="true"></i>
        </button>
      </div>
      <div class="seat-modal-img-wrap" id="seat-modal-img-wrap"></div>
    </div>
  </div>

  <!-- ══ 시설 상세 모달 ════════════════════════════════════════ -->
  <div class="fac-modal" id="fac-modal" role="dialog" aria-modal="true" aria-label="시설 상세">
    <div class="fac-modal-bd" id="fac-modal-bd"></div>
    <div class="fac-modal-sheet">
      <div class="fac-modal-handle" aria-hidden="true"></div>
      <button class="fac-modal-close" id="fac-modal-close" aria-label="닫기">
        <i class="ti ti-x" aria-hidden="true"></i>
      </button>
      <div class="fac-modal-photo" id="fac-modal-photo"></div>
      <div class="fac-modal-body">
        <p class="fac-modal-floor" id="fac-modal-floor"></p>
        <p class="fac-modal-name"  id="fac-modal-name"></p>
        <p class="fac-modal-desc"  id="fac-modal-desc"></p>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script>
  (() => {
    /* ── 헬퍼 ─────────────────────────────────────────────── */
    const $ = id => document.getElementById(id);
    const escHtml = s => String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    const escAttr = s => String(s).replace(/[^a-zA-Z0-9_./:?=%&+#-]/g,
      c => `&#${c.charCodeAt(0)};`);

    /* ── PIN 게이트 ──────────────────────────────────────── */
    (function initPin() {
      const gate    = $('pin-gate');
      const input   = $('pin-input');
      const errorEl = $('pin-error');
      const correct = (EVENT.pin || '000000');

      if (sessionStorage.getItem('pin_ok') === '1') {
        gate.remove();
        return;
      }

      function attemptPin() {
        if (input.value === correct) {
          sessionStorage.setItem('pin_ok', '1');
          gate.classList.add('pin-gate--exit');
          setTimeout(() => gate.remove(), 380);
        } else {
          errorEl.textContent = '올바르지 않은 PIN 번호입니다.';
          input.value = '';
          input.classList.remove('shake');
          void input.offsetWidth; // reflow to restart animation
          input.classList.add('shake');
          setTimeout(() => input.classList.remove('shake'), 420);
          input.focus();
        }
      }

      $('pin-submit').addEventListener('click', attemptPin);
      input.addEventListener('keydown', e => { if (e.key === 'Enter') attemptPin(); });
      // Auto-submit when 6 digits entered
      input.addEventListener('input', () => {
        errorEl.textContent = '';
        if (input.value.length === 6) attemptPin();
      });
      requestAnimationFrame(() => input.focus());
    })();

    /* ── 기본 정보 채우기 ─────────────────────────────────── */
    document.title = EVENT.title;
    if (EVENT.notice) $('notice-bar').textContent = '📌 ' + EVENT.notice;

    $('hero-title').textContent    = EVENT.title;
    $('hero-subtitle').textContent = EVENT.subtitle;
    $('chip-date').querySelector('span').textContent = EVENT.date;
    $('chip-time').querySelector('span').textContent = EVENT.time;
    const vc = $('chip-venue');
    vc.querySelector('span').textContent = EVENT.venue;
    vc.href = 'https://map.naver.com/v5/search/' + encodeURIComponent(EVENT.address);

    $('footer-title').textContent = EVENT.title;
    $('footer-info').textContent  = EVENT.date + '  ·  ' + EVENT.venue;

    /* ── 탭 정의 ─────────────────────────────────────────── */
    const TABS = [
      { id:'briefing',      label:'사전안내', sub:'준비 안내',          icon:'clipboard'  },
      { id:'day-0',         label:'Day 1',   sub: EVENT.days[0].date, icon:'calendar'   },
      { id:'day-1',         label:'Day 2',   sub: EVENT.days[1].date, icon:'calendar'   },
      { id:'activities',    label:'즐길거리', sub:'&식사',              icon:'star'       },
      { id:'attendees',     label:'참석자',  sub:'참석자 정보',         icon:'users'      },
      { id:'accommodation', label:'숙소',    sub:'포유포레',            icon:'building'   },
    ];

    function tabIcon(icon, size) {
      const s = size || 15;
      if (icon === 'calendar') return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>`;
      if (icon === 'users') return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>`;
      if (icon === 'building') return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M9 9h1M14 9h1M9 14h1M14 14h1"/>
        <path d="M9 19v-5h6v5"/>
      </svg>`;
      if (icon === 'star') return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>`;
      if (icon === 'clipboard') return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
        <rect x="8" y="2" width="8" height="4" rx="1"/>
        <line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="15" y2="16"/>
      </svg>`;
      return '';
    }

    /* ── 사이드바 & 모바일 탭 렌더링 ────────────────────── */
    let activeTab = 'briefing';
    const sidebarNav = $('sidebar-tabs');
    const mobileNav  = $('mobile-tabs');
    const panelWrap  = $('panels');

    TABS.forEach(tab => {
      // 사이드바 버튼
      const sbBtn = document.createElement('button');
      sbBtn.className = 'sidebar-day-tab' + (tab.id === activeTab ? ' is-active' : '');
      sbBtn.id = `sb-tab-${tab.id}`;
      sbBtn.setAttribute('role', 'tab');
      sbBtn.setAttribute('aria-selected', tab.id === activeTab ? 'true' : 'false');
      sbBtn.setAttribute('aria-controls', `panel-${tab.id}`);
      sbBtn.innerHTML = `<span class="sidebar-tab-label">${escHtml(tab.label)}</span>
                         <span class="sidebar-tab-date">${escHtml(tab.sub)}</span>`;
      sbBtn.addEventListener('click', () => switchTab(tab.id));
      sidebarNav.appendChild(sbBtn);

      // 모바일 버튼
      const mbBtn = document.createElement('button');
      mbBtn.className = 'mobile-tab' + (tab.id === activeTab ? ' is-active' : '');
      mbBtn.id = `mb-tab-${tab.id}`;
      mbBtn.setAttribute('aria-label', `${tab.label} ${tab.sub}`);
      mbBtn.innerHTML = `
        <span class="mobile-tab-icon">${tabIcon(tab.icon, 14)}</span>
        <span class="mobile-tab-label">${escHtml(tab.label)}</span>
        <span class="mobile-tab-date">${escHtml(tab.sub)}</span>`;
      mbBtn.addEventListener('click', () => switchTab(tab.id));
      mobileNav.appendChild(mbBtn);
    });

    // 모바일 검색 탭
    const mbSearch = document.createElement('button');
    mbSearch.className = 'mobile-tab';
    mbSearch.setAttribute('aria-label', '검색');
    mbSearch.innerHTML = `
      <span class="mobile-tab-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
      <span class="mobile-tab-label">검색</span>`;
    mbSearch.addEventListener('click', openSearch);
    mobileNav.appendChild(mbSearch);

    /* ── 탭 전환 ─────────────────────────────────────────── */
    function switchTab(tabId) {
      closeSearch();
      if (tabId === activeTab) return;
      activeTab = tabId;

      document.querySelectorAll('.sidebar-day-tab').forEach(b => {
        const tid = b.id.replace('sb-tab-', '');
        b.classList.toggle('is-active', tid === tabId);
        b.setAttribute('aria-selected', tid === tabId ? 'true' : 'false');
      });
      document.querySelectorAll('[id^="mb-tab-"]').forEach(b => {
        const tid = b.id.replace('mb-tab-', '');
        b.classList.toggle('is-active', tid === tabId);
      });
      document.querySelectorAll('.main-panel').forEach(p => {
        const pid = p.id.replace('panel-', '');
        const wasActive = p.classList.contains('is-active');
        const nowActive = pid === tabId;
        p.classList.toggle('is-active', nowActive);
        if (nowActive && !wasActive) {
          p.style.animation = 'none';
          requestAnimationFrame(() => { p.style.animation = ''; });
        }
      });

      if (window.innerWidth < 768) window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 이전 버전 호환 (검색 결과 클릭 시 사용)
    function switchDay(idx) { switchTab(`day-${idx}`); }

    const PIN_SVG = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
      stroke-linejoin="round" aria-hidden="true">
      <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
      <circle cx="12" cy="10" r="3"/></svg>`;

    const TYPE_CLS = {
      keynote:'is-keynote', activity:'is-activity',
      networking:'is-networking', break:'is-break', move:'is-move',
    };

    /* ════════════════════════════════════════════════════════
       패널 0 — 사전안내
       ════════════════════════════════════════════════════════ */
    (function buildBriefingPanel() {
      const bf = EVENT.briefing;
      const panel = document.createElement('div');
      panel.className = 'main-panel is-active';
      panel.id = 'panel-briefing';
      panel.setAttribute('role', 'tabpanel');

      const inner = document.createElement('div');
      inner.className = 'panel-inner';
      inner.innerHTML = `<div class="panel-heading">
        <span class="panel-heading-label">사전안내</span>
        <span class="panel-heading-sub">준비 안내</span>
      </div>`;

      // ── 오늘 기준 NOW 카드 ──
      const todayKey = () => {
        const d = new Date(), p = n => String(n).padStart(2, '0');
        return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
      };
      const DAY1_ISO = EVENT.days[0].isoDate;
      const DAY2_ISO = EVENT.days[EVENT.days.length - 1].isoDate;
      const isWorkshopStarted = todayKey() >= DAY1_ISO;

      const nowWrap = document.createElement('div');
      nowWrap.id = 'now-card-wrap';
      inner.appendChild(nowWrap);

      function renderNowCard() {
        nowWrap.innerHTML = '';
        const key = todayKey();
        const card = document.createElement('div');
        card.className = 'now-card';
        const di = EVENT.days.findIndex(d => d.isoDate === key);

        if (di === -1 && key < DAY1_ISO) {
          const diff = Math.round((new Date(DAY1_ISO) - new Date(key)) / 86400000);
          const mp2 = EVENT.briefing.meetingPoint;
          card.innerHTML = `
            <span class="now-badge">D-${diff}</span>
            <p class="now-title">워크숍이 ${diff}일 남았어요</p>
            <p class="now-sub">${escHtml(mp2.date)} ${escHtml(mp2.time)} · ${escHtml(mp2.location)} 집합</p>`;
        } else if (di === -1) {
          card.classList.add('is-done');
          card.innerHTML = `
            <p class="now-title">워크숍이 마무리됐어요 🙌</p>
            <p class="now-sub">이틀간 고생 많으셨어요. 함께해 주셔서 감사합니다!</p>`;
        } else {
          const day = EVENT.days[di];
          const now = new Date();
          const mins = now.getHours() * 60 + now.getMinutes();
          const parse = t => {
            const m = [...t.matchAll(/(\d{1,2}):(\d{2})/g)].map(x => +x[1] * 60 + +x[2]);
            return { start: m[0] ?? 0, end: m[1] ?? (m[0] ?? 0) + 30 };
          };
          const cur = day.items.find(it => { const p = parse(it.time); return p.start <= mins && mins < p.end; });
          const nxt = day.items.find(it => parse(it.time).start > mins);

          card.innerHTML = `
            <span class="now-badge">${escHtml(day.label)}</span>
            <p class="now-title">${escHtml(day.date)}</p>`;

          const list = document.createElement('div');
          list.className = 'now-items';
          const addRow = (chip, cls, item) => {
            const row = document.createElement('div');
            row.className = 'now-item';
            row.setAttribute('role', 'button');
            row.setAttribute('tabindex', '0');
            row.innerHTML = `
              <span class="now-item-chip ${cls}">${chip}</span>
              <span class="now-item-title">${escHtml(item.title)}</span>
              <span class="now-item-time">${escHtml(item.time)}</span>`;
            const go = () => openTlModal(item);
            row.addEventListener('click', go);
            row.addEventListener('keydown', ev => { if (ev.key === 'Enter') go(); });
            list.appendChild(row);
          };
          if (cur) addRow('지금', 'is-now', cur);
          if (nxt) addRow('다음', 'is-next', nxt);
          if (!cur && !nxt) {
            const doneMsg = document.createElement('p');
            doneMsg.className = 'now-sub';
            doneMsg.textContent = mins < parse(day.items[0].time).start
              ? '오늘 일정이 아직 시작 전이에요.'
              : '오늘 일정이 모두 끝났어요. 고생하셨어요!';
            list.appendChild(doneMsg);
          }
          card.appendChild(list);

          const link = document.createElement('button');
          link.className = 'now-day-link';
          link.innerHTML = `${escHtml(day.label)} 전체 일정 보기 <i class="ti ti-arrow-right" aria-hidden="true"></i>`;
          link.addEventListener('click', () => switchDay(di));
          card.appendChild(link);
        }
        nowWrap.appendChild(card);
      }
      renderNowCard();
      setInterval(renderNowCard, 60000);

      // 집합 안내 카드
      const mp = bf.meetingPoint;
      const meetCard = document.createElement('div');
      meetCard.className = 'briefing-meeting-card';
      meetCard.innerHTML = `
        <span class="briefing-meeting-label">집합 장소</span>
        <p class="briefing-meeting-name">${escHtml(mp.location)}</p>
        <p class="briefing-meeting-time">${escHtml(mp.date)} &nbsp;·&nbsp; ${escHtml(mp.time)}</p>
        ${mp.note ? `<p class="briefing-meeting-note">${escHtml(mp.note)}</p>` : ''}
        ${mp.locationUrl ? `<a class="briefing-meeting-link" href="${escAttr(mp.locationUrl)}"
          target="_blank" rel="noopener">
          ${PIN_SVG} 지도에서 보기
        </a>` : ''}`;
      inner.appendChild(meetCard);

      // 토글 섹션 빌더
      function collapsibleSection(title, bodyEl, startOpen) {
        const section = document.createElement('div');
        section.className = 'briefing-section is-collapsible' + (startOpen ? ' is-open' : '');
        const head = document.createElement('button');
        head.type = 'button';
        head.className = 'briefing-section-toggle';
        head.setAttribute('aria-expanded', String(!!startOpen));
        head.innerHTML = `<span class="briefing-section-title">${escHtml(title)}</span>
          <i class="ti ti-chevron-down" aria-hidden="true"></i>`;
        head.addEventListener('click', () => {
          const open = section.classList.toggle('is-open');
          head.setAttribute('aria-expanded', String(open));
        });
        const body = document.createElement('div');
        body.className = 'briefing-section-body';
        body.appendChild(bodyEl);
        section.appendChild(head);
        section.appendChild(body);
        return section;
      }

      // 준비물 체크리스트 (워크숍 시작 후엔 기본 접힘)
      if (bf.checklist && bf.checklist.length) {
        const prepList = document.createElement('div');
        prepList.className = 'prep-list';
        bf.checklist.forEach(item => {
          const card = document.createElement('div');
          card.className = 'prep-card';
          card.innerHTML = `<div class="prep-main">
            <div class="prep-icon" aria-hidden="true">${escHtml(item.emoji)}</div>
            <div class="prep-content">
              <p class="prep-title">${escHtml(item.title)}</p>
              <p class="prep-desc">${escHtml(item.desc)}</p>
            </div>
          </div>`;
          if (item.sub) {
            const sub = document.createElement('div');
            sub.className = `prep-sub type-${escHtml(item.sub.type)}`;
            sub.innerHTML = `
              <span class="prep-sub-emoji" aria-hidden="true">${escHtml(item.sub.emoji)}</span>
              <span class="prep-sub-content">
                <span class="prep-badge badge-${escHtml(item.sub.type)}">${escHtml(item.sub.badge)}</span>${escHtml(item.sub.text)}
              </span>`;
            card.appendChild(sub);
          }
          prepList.appendChild(card);
        });
        inner.appendChild(collapsibleSection('준비물', prepList, !isWorkshopStarted));
      }

      // 안내사항
      if (bf.notes && bf.notes.length) {
        const noteList = document.createElement('div');
        noteList.className = 'briefing-notes-list';
        bf.notes.forEach(n => {
          const item = document.createElement('div');
          item.className = 'briefing-note-item';
          item.innerHTML = `<i class="ti ti-info-circle" aria-hidden="true"></i>
            <span>${escHtml(n)}</span>`;
          noteList.appendChild(item);
        });
        inner.appendChild(collapsibleSection('안내사항', noteList, true));
      }

      panel.appendChild(inner);
      panelWrap.appendChild(panel);
    })();

    /* ════════════════════════════════════════════════════════
       패널 1·2 — Day 타임라인
       ════════════════════════════════════════════════════════ */

    function buildTimeline(items) {
      const track = document.createElement('div');
      track.className = 'tl-track';

      items.forEach(item => {
        const typeCls = TYPE_CLS[item.type] || '';
        const row = document.createElement('div');
        row.className = 'tl-row' + (typeCls ? ' ' + typeCls : '');

        // Parse start time → hour / minute parts
        const startTime = item.time.split(/\s*[–\-]\s*/)[0].trim();
        const [hh, mm] = startTime.split(':');

        // Time column
        const tcol = document.createElement('div');
        tcol.className = 'tl-tcol';
        tcol.setAttribute('aria-hidden', 'true');
        tcol.innerHTML = `<span class="tl-th">${escHtml(hh || '??')}</span>`
                       + `<span class="tl-tm">:${escHtml(mm || '00')}</span>`;

        // Dot + connector column
        const lcol = document.createElement('div');
        lcol.className = 'tl-lcol';
        lcol.innerHTML = `<div class="tl-dot"></div><div class="tl-conn"></div>`;

        row.appendChild(tcol);
        row.appendChild(lcol);

        const isCompact = item.type === 'move' || item.title === '휴식 시간';
        if (isCompact) {
          const compact = document.createElement('div');
          compact.className = 'tl-compact';
          let inner = `<span class="sr-only">${escHtml(item.time)} — </span>`
                    + `<span class="tl-title">${escHtml(item.title)}</span>`;
          if (item.desc) inner += `<span class="tl-note">${escHtml(item.desc)}</span>`;
          if (item.note) inner += `<span class="tl-note">${escHtml(item.note)}</span>`;
          if (item.location && item.locationUrl) {
            inner += `<a class="tl-location" href="${escAttr(item.locationUrl)}"
              target="_blank" rel="noopener noreferrer">${PIN_SVG}${escHtml(item.location)}</a>`;
          } else if (item.location) {
            inner += `<span class="tl-note">${escHtml(item.location)}</span>`;
          }
          compact.innerHTML = inner;
          row.appendChild(compact);
        } else {
          const card = document.createElement('div');
          card.className = 'tl-card';
          const desc = item.desc
            ? `<p class="tl-desc">${escHtml(item.desc).replace(/\n/g,'<br>')}</p>` : '';
          const note = item.note ? `<span class="tl-note">${escHtml(item.note)}</span>` : '';
          const loc  = item.location && item.locationUrl
            ? `<a class="tl-location" href="${escAttr(item.locationUrl)}"
                 target="_blank" rel="noopener noreferrer">${PIN_SVG}${escHtml(item.location)}</a>`
            : item.location ? `<span class="tl-note">${escHtml(item.location)}</span>` : '';
          const meta = (note || loc) ? `<div class="tl-meta">${note}${loc}</div>` : '';
          card.innerHTML = `<p class="tl-title">
            <span class="sr-only">${escHtml(item.time)} — </span>${escHtml(item.title)}
          </p>${desc}${meta}`;
          row.appendChild(card);
        }

        // 즐길거리&식사 크로스링크 처리 (chip만 유지)
        if (item.activityId) {
          row.id = 'tl-row-' + item.activityId;
          row.classList.add('has-link');
          const contentEl = row.querySelector('.tl-card, .tl-compact');
          if (contentEl) {
            const chip = document.createElement('span');
            chip.className = 'tl-link-chip';
            chip.innerHTML = `<i class="ti ti-star" aria-hidden="true"></i> 즐길거리&amp;식사 보기`;
            chip.addEventListener('click', e => { e.stopPropagation(); switchToActivity(item.activityId); });
            contentEl.appendChild(chip);
          }
        }

        // 숙소 서브탭 크로스링크 처리
        if (item.accTabId) {
          row.classList.add('has-link');
          const contentEl = row.querySelector('.tl-card, .tl-compact');
          if (contentEl) {
            const chip = document.createElement('span');
            chip.className = 'tl-link-chip';
            chip.innerHTML = `<i class="ti ti-building" aria-hidden="true"></i> 숙소 안내에서 보기`;
            chip.addEventListener('click', e => { e.stopPropagation(); switchToAccTab(item.accTabId); });
            contentEl.appendChild(chip);
          }
        }

        // 이동·휴식 제외 전체 항목 클릭 → 상세 모달
        const isExcluded = item.type === 'move' || item.title === '휴식 시간';
        if (!isExcluded) {
          const clickable = row.querySelector('.tl-card, .tl-compact');
          if (clickable) {
            clickable.style.cursor = 'pointer';
            clickable.addEventListener('click', e => {
              if (e.target.closest('a') || e.target.closest('.tl-link-chip')) return;
              openTlModal(item);
            });
          }
        }

        track.appendChild(row);
      });

      return track;
    }

    EVENT.days.forEach((day, i) => {
      const panel = document.createElement('div');
      panel.className = 'main-panel';
      panel.id = `panel-day-${i}`;
      panel.setAttribute('role', 'tabpanel');
      panel.setAttribute('aria-labelledby', `sb-tab-day-${i}`);
      const inner = document.createElement('div');
      inner.className = 'panel-inner';
      inner.innerHTML = `<div class="day-heading">
        <span class="day-heading-label">${escHtml(day.label)}</span>
        <span class="day-heading-date">${escHtml(day.date)}</span>
      </div>`;
      inner.appendChild(buildTimeline(day.items));
      panel.appendChild(inner);
      panelWrap.appendChild(panel);
    });

    /* ════════════════════════════════════════════════════════
       크로스링크 헬퍼
       ════════════════════════════════════════════════════════ */
    function switchToAccTab(tabId) {
      switchTab('accommodation');
      requestAnimationFrame(() => {
        const btn = document.querySelector(`[data-acc-tab="${CSS.escape(tabId)}"]`);
        if (btn) btn.click();
      });
    }

    function switchToActivity(actId) {
      switchTab('activities');
      requestAnimationFrame(() => {
        const el = document.getElementById('act-card-' + actId);
        if (!el) return;
        el.scrollIntoView({ behavior:'smooth', block:'nearest' });
        el.classList.remove('act-card--highlight');
        void el.offsetWidth;
        el.classList.add('act-card--highlight');
      });
    }

    function switchToTimelineItem(dayIdx, actId) {
      switchTab('day-' + dayIdx);
      requestAnimationFrame(() => {
        const el = document.getElementById('tl-row-' + actId);
        if (!el) return;
        el.scrollIntoView({ behavior:'smooth', block:'nearest' });
        el.classList.remove('tl-row--highlight');
        void el.offsetWidth;
        el.classList.add('tl-row--highlight');
      });
    }

    /* ════════════════════════════════════════════════════════
       패널 3 — 즐길거리 & 식사
       ════════════════════════════════════════════════════════ */
    (function buildActivitiesPanel() {
      const panel = document.createElement('div');
      panel.className = 'main-panel';
      panel.id = 'panel-activities';
      panel.setAttribute('role', 'tabpanel');

      const inner = document.createElement('div');
      inner.className = 'panel-inner';

      inner.innerHTML = `<div class="panel-heading">
        <span class="panel-heading-label">즐길거리 &amp; 식사</span>
        <span class="panel-heading-sub">${escHtml(String(EVENT.activities.length))}개</span>
      </div>`;

      // 필터 바
      const FILTERS = [
        { id:'all', label:'전체' },
        { id:'액티비티', label:'액티비티' },
        { id:'식사', label:'식사' },
      ];
      let activeFilter = 'all';

      const filterBar = document.createElement('div');
      filterBar.className = 'act-filter-bar';

      FILTERS.forEach(f => {
        const btn = document.createElement('button');
        btn.className = 'act-filter-btn' + (f.id === activeFilter ? ' is-active' : '');
        btn.textContent = f.label;
        btn.addEventListener('click', () => {
          activeFilter = f.id;
          filterBar.querySelectorAll('.act-filter-btn').forEach(b => b.classList.remove('is-active'));
          btn.classList.add('is-active');
          list.querySelectorAll('.act-card').forEach(card => {
            const show = f.id === 'all' || card.dataset.category === f.id;
            card.style.display = show ? '' : 'none';
          });
        });
        filterBar.appendChild(btn);
      });
      inner.appendChild(filterBar);

      // 카드 목록
      const list = document.createElement('div');
      list.className = 'act-list';

      EVENT.activities.forEach(act => {
        const dayLabel = (EVENT.days[act.day] || {}).label || '';
        const card = document.createElement('div');
        card.className = 'act-card';
        card.id = 'act-card-' + act.id;
        card.dataset.category = act.category;

        // 사진 영역
        const photoDiv = document.createElement('div');
        photoDiv.className = 'act-card-photo';
        if (act.image) {
          photoDiv.innerHTML = `<img src="images/activities/${escAttr(act.image)}" alt="${escAttr(act.title)}" loading="lazy">`;
        } else {
          photoDiv.innerHTML = `<div class="act-card-photo-ph">
            <i class="ti ${escAttr(act.icon || 'ti-star')}" aria-hidden="true"></i>
            <span>사진 준비 중</span>
          </div>`;
        }
        card.appendChild(photoDiv);

        // 바디
        const catBadgeCls = act.category === '액티비티' ? 'act-badge-activity' : 'act-badge-food';
        const locHtml = act.locationUrl
          ? `<a class="act-card-loc" href="${escAttr(act.locationUrl)}" target="_blank" rel="noopener">
               ${PIN_SVG} ${escHtml(act.location)}
             </a>`
          : act.location
            ? `<span class="act-card-loc">${PIN_SVG} ${escHtml(act.location)}</span>`
            : '';

        const body = document.createElement('div');
        body.className = 'act-card-body';
        body.innerHTML = `
          <div class="act-card-meta">
            <span class="act-badge ${catBadgeCls}">${escHtml(act.category)}</span>
            <span class="act-badge act-badge-day">${escHtml(dayLabel)}</span>
            <span class="act-card-time">${escHtml(act.time)}</span>
          </div>
          <p class="act-card-title">${escHtml(act.title)}</p>
          ${locHtml}
          ${act.desc ? `<p class="act-card-desc">${escHtml(act.desc).replace(/\n/g,'<br>')}</p>` : ''}
          ${act.note ? `<p class="act-card-note">${escHtml(act.note)}</p>` : ''}
          ${act.caution ? `<div class="act-card-caution">
            <span class="act-caution-icon">☀️</span>
            <span class="act-caution-text">${escHtml(act.caution.text)}</span>
            ${act.caution.linkUrl ? `<a class="act-caution-link" href="${escAttr(act.caution.linkUrl)}" target="_blank" rel="noopener noreferrer">${escHtml(act.caution.linkLabel)} →</a>` : ''}
          </div>` : ''}`;

        // 타임라인 이동 버튼
        const footer = document.createElement('div');
        footer.className = 'act-card-footer';
        const tlBtn = document.createElement('button');
        tlBtn.className = 'act-tl-btn';
        tlBtn.innerHTML = `<i class="ti ti-calendar-event" aria-hidden="true"></i> ${escHtml(dayLabel)} 일정에서 보기`;
        tlBtn.addEventListener('click', e => {
          e.stopPropagation();
          switchToTimelineItem(act.day, act.id);
        });
        footer.appendChild(tlBtn);
        body.appendChild(footer);
        card.appendChild(body);
        list.appendChild(card);
      });

      inner.appendChild(list);
      panel.appendChild(inner);
      panelWrap.appendChild(panel);
    })();

    /* ════════════════════════════════════════════════════════
       패널 4 — 참석자
       ════════════════════════════════════════════════════════ */
    function avatarColor(title) {
      if (title === 'CEO')                                      return '#C5A55A';
      if (title === 'Group Leader' || title === 'Center Leader') return '#3A7BD5';
      if (title === 'Team Leader')                              return '#4A6FA5';
      if (title === 'Part Leader')                              return '#2E8B5A';
      return '#8A9BAD';
    }
    function badgeClass(title) {
      if (title === 'CEO')            return 'badge-ceo';
      if (title === 'Group Leader')   return 'badge-group';
      if (title === 'Center Leader')  return 'badge-center';
      if (title === 'Team Leader')    return 'badge-team';
      if (title === 'Part Leader')    return 'badge-part';
      return 'badge-staff';
    }

    (function buildAttendeePanel() {
      const roomMap = {};
      (EVENT.accommodation.rooms || []).forEach(r => {
        r.occupants.forEach(name => { roomMap[name] = r.room; });
      });

      // 직책 정렬 순서
      const TITLE_ORDER = { 'CEO': 0, 'Group Leader': 1, 'Center Leader': 2, 'Team Leader': 3, 'Part Leader': 4, 'Staff': 5 };
      const sorted = [...EVENT.attendees].sort((a, b) => (TITLE_ORDER[a.title] ?? 9) - (TITLE_ORDER[b.title] ?? 9));

      const panel = document.createElement('div');
      panel.className = 'main-panel';
      panel.id = 'panel-attendees';
      panel.setAttribute('role', 'tabpanel');

      const inner = document.createElement('div');
      inner.className = 'panel-inner';

      const headHtml = `<div class="panel-heading">
        <span class="panel-heading-label">참석자</span>
        <span class="panel-heading-sub">${escHtml(String(EVENT.attendees.length))}명</span>
      </div>
      <p class="att-tip"><i class="ti ti-phone-call" aria-hidden="true"></i> 카드를 탭하면 연락처를 확인하고 바로 전화할 수 있어요.</p>`;

      const grid = document.createElement('div');
      grid.className = 'attendee-grid';

      sorted.forEach(a => {
        const card = document.createElement('div');
        card.className = 'attendee-card';
        card.style.cursor = 'pointer';

        const givenName = a.name.length >= 3 ? a.name.slice(1) : a.name;
        const teamLine = a.team && a.team !== '-'
          ? `${escHtml(a.division)}<br>${escHtml(a.team)}`
          : `${escHtml(a.division)}`;

        const roomNum = roomMap[a.name];
        card.innerHTML = `
          <div class="attendee-avatar" style="--avatar-color:${avatarColor(a.title)}">${escHtml(givenName)}</div>
          <div class="attendee-info">
            <span class="attendee-name">${escHtml(a.name)}</span>
            <span class="attendee-badge ${badgeClass(a.title)}">${escHtml(a.title)}</span>
            <span class="attendee-meta">${teamLine}</span>
            ${roomNum ? `<span class="attendee-room"><i class="ti ti-door" aria-hidden="true"></i>${escHtml(roomNum)}</span>` : ''}
          </div>`;

        card.addEventListener('click', () => openAttModal(a, roomNum));
        grid.appendChild(card);
      });

      inner.innerHTML = headHtml;
      inner.appendChild(grid);
      panel.appendChild(inner);
      panelWrap.appendChild(panel);
    })();

    /* 참석자 상세 모달 */
    function openAttModal(a, roomNum) {
      const givenName = a.name.length >= 3 ? a.name.slice(1) : a.name;
      $('att-modal-avatar').textContent = givenName;
      $('att-modal-avatar').style.setProperty('--avatar-color', avatarColor(a.title));
      $('att-modal-name').textContent  = a.name;
      $('att-modal-badge').textContent = a.title;
      $('att-modal-badge').className   = 'att-modal-badge ' + badgeClass(a.title);
      $('att-modal-team').innerHTML    = a.team && a.team !== '-'
        ? `${escHtml(a.division)} · ${escHtml(a.team)}`
        : escHtml(a.division);

      const roomEl  = $('att-modal-room');
      if (roomNum) { roomEl.innerHTML = `<i class="ti ti-door" aria-hidden="true"></i>${escHtml(roomNum)}`; roomEl.hidden = false; }
      else         { roomEl.hidden = true; }

      const phoneEl = $('att-modal-phone');
      if (a.phone) {
        phoneEl.href        = `tel:${a.phone.replace(/-/g,'')}`;
        phoneEl.textContent = a.phone;
        phoneEl.hidden      = false;
      } else {
        phoneEl.hidden = true;
      }

      $('att-modal').classList.add('is-open');
      document.body.style.overflow = 'hidden';
    }
    function closeAttModal() {
      $('att-modal').classList.remove('is-open');
      document.body.style.overflow = '';
    }
    $('att-modal-bd').addEventListener('click', closeAttModal);
    $('att-modal-close').addEventListener('click', closeAttModal);

    /* ════════════════════════════════════════════════════════
       패널 4 — 숙소 (포유포레)
       ════════════════════════════════════════════════════════ */
    const ACC_SUBTABS = [
      { id:'facilities', label:'시설안내'  },
      { id:'doorcode',   label:'도어록'    },
      { id:'smoking',    label:'흡연구역'  },
      { id:'wifi',       label:'와이파이'  },
      { id:'rooms',      label:'방배정'    },
      { id:'breakfast',  label:'Day 2 조식'},
    ];
    let activeAccTab = 'facilities';

    function switchAccTab(id) {
      activeAccTab = id;
      document.querySelectorAll('.acc-subtab').forEach(b => {
        b.classList.toggle('is-active', b.dataset.tab === id);
      });
      document.querySelectorAll('.acc-subpanel').forEach(p => {
        p.classList.toggle('is-active', p.dataset.panel === id);
      });
    }

    (function buildAccPanel() {
      const acc   = EVENT.accommodation;
      const panel = document.createElement('div');
      panel.className = 'main-panel';
      panel.id = 'panel-accommodation';
      panel.setAttribute('role', 'tabpanel');

      const inner = document.createElement('div');
      inner.className = 'panel-inner';

      // 헤딩
      inner.innerHTML = `<div class="panel-heading">
        <span class="panel-heading-label">${escHtml(acc.name)}</span>
        <a class="panel-heading-sub" href="${escAttr(acc.locationUrl)}"
           target="_blank" rel="noopener" style="text-decoration:none;">
          지도 →</a>
      </div>`;

      // 서브탭 바
      const tabBar = document.createElement('div');
      tabBar.className = 'acc-subtabs-bar';
      ACC_SUBTABS.forEach(st => {
        const btn = document.createElement('button');
        btn.className = 'acc-subtab' + (st.id === activeAccTab ? ' is-active' : '');
        btn.dataset.tab = st.id;
        btn.textContent = st.label;
        btn.addEventListener('click', () => switchAccTab(st.id));
        tabBar.appendChild(btn);
      });
      inner.appendChild(tabBar);

      // ─ 서브패널: 시설안내 (Option C — 층별 스트립 + 클릭 모달) ─
      const facPanel = document.createElement('div');
      facPanel.className = 'acc-subpanel is-active';
      facPanel.dataset.panel = 'facilities';

      acc.floors.forEach(floor => {
        const floorNum = floor.label.replace(/[^0-9]/g, '');

        // Navy floor header band
        const hd = document.createElement('div');
        hd.className = 'acc-floor-hd';
        hd.innerHTML = `<span class="acc-floor-hd-num">${escHtml(floorNum)}</span>`
                     + `<span class="acc-floor-hd-f">F</span>`
                     + (floor.note ? `<span class="acc-floor-hd-note">${escHtml(floor.note)}</span>` : '')
                     + `<span class="acc-floor-hd-count">${floor.spaces.length}개</span>`;
        facPanel.appendChild(hd);

        // Clickable facility rows
        const rows = document.createElement('div');
        rows.className = 'acc-fac-rows';
        floor.spaces.forEach(sp => {
          const row = document.createElement('div');
          row.className = 'acc-fac-row';
          row.setAttribute('role', 'button');
          row.setAttribute('tabindex', '0');
          row.setAttribute('aria-label', `${sp.name} 상세보기`);

          const thumbHtml = sp.image
            ? `<div class="acc-fac-thumb">
                 <img src="images/facilities/${escAttr(sp.image)}" alt="${escAttr(sp.name)}" loading="lazy">
               </div>`
            : `<div class="acc-fac-thumb"><i class="ti ${escAttr(sp.icon || 'ti-building')}" aria-hidden="true"></i></div>`;

          row.innerHTML = `${thumbHtml}
            <div class="acc-fac-info">
              <p class="acc-fac-name">${escHtml(sp.name)}</p>
              ${sp.desc ? `<p class="acc-fac-desc">${escHtml(sp.desc)}</p>` : ''}
            </div>
            <i class="ti ti-chevron-right acc-fac-chev" aria-hidden="true"></i>`;

          const payload = { floor: floor.label, name: sp.name, desc: sp.desc, image: sp.image, icon: sp.icon };
          const open = () => openFacModal(payload);
          row.addEventListener('click', open);
          row.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); } });
          rows.appendChild(row);
        });
        facPanel.appendChild(rows);
      });

      inner.appendChild(facPanel);

      // ─ 서브패널: 도어록 ─
      const doorcodePanel = document.createElement('div');
      doorcodePanel.className = 'acc-subpanel';
      doorcodePanel.dataset.panel = 'doorcode';
      if (acc.doorCode) {
        const doorCard = document.createElement('div');
        doorCard.className = 'wifi-card';
        doorCard.innerHTML = `<p class="wifi-card-title"><i class="ti ti-lock" aria-hidden="true"></i> 도어록 비밀번호</p>` +
          copyRow('비밀번호', acc.doorCode);
        doorcodePanel.appendChild(doorCard);
      }
      inner.appendChild(doorcodePanel);

      // ─ 서브패널: 흡연구역 ─
      const smokingPanel = document.createElement('div');
      smokingPanel.className = 'acc-subpanel';
      smokingPanel.dataset.panel = 'smoking';

      if (acc.smokingAreas && acc.smokingAreas.length) {
        const spots = document.createElement('div');
        spots.className = 'smoking-spots';
        acc.smokingAreas.forEach(s => {
          const card = document.createElement('div');
          card.className = 'smoking-spot-card';
          // images 배열 우선, 없으면 단일 image 폴백
          const imgList = s.images && s.images.length ? s.images : (s.image ? [s.image] : []);
          if (imgList.length) {
            const imgRow = document.createElement('div');
            imgRow.className = 'smoking-spot-imgs';
            imgList.forEach(fname => {
              const img = document.createElement('img');
              img.className = 'smoking-spot-img';
              img.src = `images/facilities/${escAttr(fname)}`;
              img.alt = escAttr(s.spot);
              img.loading = 'lazy';
              imgRow.appendChild(img);
            });
            card.appendChild(imgRow);
          }
          const body = document.createElement('div');
          body.className = 'smoking-spot-body';
          body.innerHTML = `<span class="smoking-spot-label">🚬 ${escHtml(s.spot)}</span>
            <p class="smoking-spot-desc">${escHtml(s.desc)}</p>`;
          card.appendChild(body);
          spots.appendChild(card);
        });
        smokingPanel.appendChild(spots);
      } else {
        smokingPanel.innerHTML = `<div class="placeholder-card">
          <span class="placeholder-emoji">🚬</span>
          <p class="placeholder-title">흡연구역 정보 준비 중</p>
          <p class="placeholder-desc">현장 도착 후 안내드립니다.</p>
        </div>`;
      }
      inner.appendChild(smokingPanel);

      // ─ 서브패널: 와이파이 ─
      const wifiPanel = document.createElement('div');
      wifiPanel.className = 'acc-subpanel';
      wifiPanel.dataset.panel = 'wifi';

      function copyRow(label, value) {
        const btnId = `copy-${label.replace(/\s/g,'')}`;
        return `<div class="wifi-row">
          <span class="wifi-label">${escHtml(label)}</span>
          <span class="wifi-value" id="v-${btnId}">
            <span>${escHtml(value)}</span>
            <button class="wifi-copy-btn" id="${escAttr(btnId)}"
              onclick="(function(btn,val){
                navigator.clipboard.writeText(val).then(()=>{
                  btn.textContent='복사됨!';
                  setTimeout(()=>btn.textContent='복사',2000);
                }).catch(()=>{});
              })(this,'${escAttr(value)}')" aria-label="${escHtml(label)} 복사">복사</button>
          </span>
        </div>`;
      }

      if (acc.wifi && acc.wifi.length) {
        acc.wifi.forEach(w => {
          const card = document.createElement('div');
          card.className = 'wifi-card';
          card.innerHTML = `<p class="wifi-card-title"><i class="ti ti-wifi" aria-hidden="true"></i> Wi-Fi</p>` +
            copyRow('비밀번호', w.password);
          wifiPanel.appendChild(card);
        });
      } else {
        wifiPanel.innerHTML = `<div class="placeholder-card">
          <span class="placeholder-emoji">📶</span>
          <p class="placeholder-title">와이파이 정보 준비 중</p>
          <p class="placeholder-desc">현장 도착 후 안내드립니다.</p>
        </div>`;
      }
      inner.appendChild(wifiPanel);

      // ─ 서브패널: 방배정 ─
      const roomsPanel = document.createElement('div');
      roomsPanel.className = 'acc-subpanel';
      roomsPanel.dataset.panel = 'rooms';

      if (acc.rooms && acc.rooms.length) {
        // 층별 그룹핑 (201→2층, 301→3층, 401→4층)
        const floorMap = {};
        acc.rooms.forEach(r => {
          const floorKey = r.room.charAt(0) + '층';
          if (!floorMap[floorKey]) floorMap[floorKey] = [];
          floorMap[floorKey].push(r);
        });
        Object.entries(floorMap).forEach(([floorLabel, rooms]) => {
          const section = document.createElement('div');
          section.className = 'room-floor-section';
          const lbl = document.createElement('p');
          lbl.className = 'room-floor-label';
          lbl.textContent = floorLabel;
          section.appendChild(lbl);
          const grid = document.createElement('div');
          grid.className = 'room-grid';
          rooms.forEach(r => {
            const card = document.createElement('div');
            card.className = 'room-card';
            const occupantsHtml = r.occupants.map(o => `<span class="room-person">${escHtml(o)}</span>`).join('');
            card.innerHTML = `
              <div class="room-header">
                <p class="room-name">${escHtml(r.room)}</p>
                ${r.note ? `<span class="room-note-badge">${escHtml(r.note)}</span>` : ''}
              </div>
              ${r.type ? `<p class="room-type">${escHtml(r.type)}</p>` : ''}
              <div class="room-occupants">${occupantsHtml}</div>`;
            grid.appendChild(card);
          });
          section.appendChild(grid);
          roomsPanel.appendChild(section);
        });
      } else {
        roomsPanel.innerHTML = `<div class="placeholder-card">
          <span class="placeholder-emoji">🛏</span>
          <p class="placeholder-title">방배정 안내 예정</p>
          <p class="placeholder-desc">워크숍 전 확정 후 업데이트됩니다.</p>
        </div>`;
      }
      inner.appendChild(roomsPanel);

      // ─ 서브패널: Day 2 조식 ─
      const breakfastPanel = document.createElement('div');
      breakfastPanel.className = 'acc-subpanel';
      breakfastPanel.dataset.panel = 'breakfast';
      const bf = acc.breakfast || {};

      if (bf.desc || bf.time || bf.location || bf.menu || bf.note) {
        const card = document.createElement('div');
        card.className = 'breakfast-card';
        let rows = '';
        if (bf.desc)     rows += `<p class="breakfast-desc">${escHtml(bf.desc)}</p>`;
        if (bf.time)     rows += `<div class="breakfast-row"><span class="breakfast-key">시간</span><span class="breakfast-val">${escHtml(bf.time)}</span></div>`;
        if (bf.location) rows += `<div class="breakfast-row"><span class="breakfast-key">장소</span><span class="breakfast-val">${escHtml(bf.location)}</span></div>`;
        if (bf.menu)     rows += `<div class="breakfast-row"><span class="breakfast-key">메뉴</span><span class="breakfast-val">${escHtml(bf.menu)}</span></div>`;
        if (bf.note)     rows += `<div class="breakfast-row"><span class="breakfast-key">안내</span><span class="breakfast-val">${escHtml(bf.note)}</span></div>`;
        card.innerHTML = rows;
        breakfastPanel.appendChild(card);
      } else {
        breakfastPanel.innerHTML = `<div class="placeholder-card">
          <span class="placeholder-emoji">☕</span>
          <p class="placeholder-title">조식 정보 준비 중</p>
          <p class="placeholder-desc">Day 2 아침식사 안내가 업데이트됩니다.</p>
        </div>`;
      }
      inner.appendChild(breakfastPanel);


      panel.appendChild(inner);
      panelWrap.appendChild(panel);
    })();

    /* ════════════════════════════════════════════════════════
       검색
       ════════════════════════════════════════════════════════ */
    const overlay  = $('search-overlay');
    const input    = $('search-input');
    const results  = $('search-results');
    const openBtn  = $('search-open-btn');
    const closeBtn = $('search-close-btn');

    function openSearch() {
      overlay.classList.add('is-open');
      input.focus();
    }
    function closeSearch() {
      overlay.classList.remove('is-open');
      input.value = '';
      results.innerHTML = '';
    }

    /* ── 시설 모달 ──────────────────────────────────────────── */
    function openFacModal(sp) {
      const modal     = $('fac-modal');
      const photoArea = $('fac-modal-photo');
      $('fac-modal-floor').textContent = sp.floor || '';
      $('fac-modal-name').textContent  = sp.name  || '';
      $('fac-modal-desc').textContent  = sp.desc  || '';
      photoArea.innerHTML = sp.image
        ? `<img src="images/facilities/${escAttr(sp.image)}" alt="${escAttr(sp.name)}">`
        : `<div class="fac-modal-photo-ph">
             <i class="ti ${escAttr(sp.icon || 'ti-building')}" aria-hidden="true"></i>
             <span>사진 준비 중</span>
           </div>`;
      modal.classList.add('is-open');
      document.body.style.overflow = 'hidden';
    }
    function closeFacModal() {
      $('fac-modal').classList.remove('is-open');
      document.body.style.overflow = '';
    }
    $('fac-modal-bd').addEventListener('click', closeFacModal);
    $('fac-modal-close').addEventListener('click', closeFacModal);

    /* ── 타임라인 일정 상세 모달 ────────────────────────────── */
    function openTlModal(item) {
      const modal = $('tl-detail-modal');
      $('tl-dm-time').textContent  = item.time  || '';
      $('tl-dm-title').textContent = item.title || '';

      const descEl = $('tl-dm-desc');
      if (item.desc) { descEl.innerHTML = escHtml(item.desc).replace(/\n/g,'<br>'); descEl.hidden = false; }
      else           { descEl.innerHTML = ''; descEl.hidden = true; }

      const noteEl = $('tl-dm-note');
      if (item.note) { noteEl.textContent = item.note; noteEl.hidden = false; }
      else           { noteEl.textContent = ''; noteEl.hidden = true; }

      const locWrap = $('tl-dm-loc-wrap');
      locWrap.innerHTML = '';
      if (item.location) {
        locWrap.innerHTML = item.locationUrl
          ? `<a class="tl-dm-loc" href="${escAttr(item.locationUrl)}" target="_blank" rel="noopener noreferrer"><i class="ti ti-map-pin" aria-hidden="true"></i>${escHtml(item.location)}</a>`
          : `<span class="tl-dm-loc"><i class="ti ti-map-pin" aria-hidden="true"></i>${escHtml(item.location)}</span>`;
      }

      const actions = $('tl-dm-actions');
      actions.innerHTML = '';
      if (item.activityId) {
        const btn = document.createElement('button');
        btn.className = 'tl-dm-btn';
        btn.innerHTML = `<i class="ti ti-star" aria-hidden="true"></i> 즐길거리&amp;식사에서 보기`;
        btn.onclick = () => { closeTlModal(); switchToActivity(item.activityId); };
        actions.appendChild(btn);
      }
      if (item.title && item.title.includes('룸 배정')) {
        const btn = document.createElement('button');
        btn.className = 'tl-dm-btn';
        btn.innerHTML = `<i class="ti ti-building" aria-hidden="true"></i> 숙소 안내 보기`;
        btn.onclick = () => { closeTlModal(); switchTab('accommodation'); };
        actions.appendChild(btn);
      }
      if (item.accTabId) {
        const btn = document.createElement('button');
        btn.className = 'tl-dm-btn';
        btn.innerHTML = `<i class="ti ti-coffee" aria-hidden="true"></i> 숙소 > Day 2 조식 보기`;
        btn.onclick = () => { closeTlModal(); switchToAccTab(item.accTabId); };
        actions.appendChild(btn);
      }
      if (item.type === 'keynote' && EVENT.seatingChart && EVENT.seatingChart.image) {
        const btn = document.createElement('button');
        btn.className = 'tl-dm-btn tl-dm-btn--seat';
        btn.innerHTML = `<i class="ti ti-layout-rows" aria-hidden="true"></i> 자리배치도 확인`;
        btn.onclick = () => { closeTlModal(); openSeatModal(); };
        actions.appendChild(btn);
      }

      modal.classList.add('is-open');
      document.body.style.overflow = 'hidden';
    }
    function closeTlModal() {
      $('tl-detail-modal').classList.remove('is-open');
      document.body.style.overflow = '';
    }
    $('tl-detail-bd').addEventListener('click', closeTlModal);
    $('tl-detail-close').addEventListener('click', closeTlModal);

    /* ── 자리배치도 모달 ─────────────────────────────────────── */
    function openSeatModal() {
      const wrap = $('seat-modal-img-wrap');
      wrap.innerHTML = '';
      if (EVENT.seatingChart && EVENT.seatingChart.image) {
        const img = document.createElement('img');
        img.src = `images/${escAttr(EVENT.seatingChart.image)}`;
        img.alt = '자리배치도';
        img.className = 'seat-modal-img';
        wrap.appendChild(img);
      }
      $('seat-modal').classList.add('is-open');
      document.body.style.overflow = 'hidden';
    }
    function closeSeatModal() {
      $('seat-modal').classList.remove('is-open');
      document.body.style.overflow = '';
    }
    $('seat-modal-bd').addEventListener('click', closeSeatModal);
    $('seat-modal-close').addEventListener('click', closeSeatModal);
    openBtn.addEventListener('click', openSearch);
    closeBtn.addEventListener('click', closeSearch);
    document.addEventListener('keydown', e => {
      if (e.key !== 'Escape') return;
      if ($('att-modal').classList.contains('is-open'))        { closeAttModal();  return; }
      if ($('tl-detail-modal').classList.contains('is-open'))  { closeTlModal();   return; }
      if ($('seat-modal').classList.contains('is-open'))       { closeSeatModal(); return; }
      if ($('fac-modal').classList.contains('is-open'))        { closeFacModal();  return; }
      if (overlay.classList.contains('is-open'))               { closeSearch();    return; }
    });

    let debounce;
    input.addEventListener('input', () => {
      clearTimeout(debounce);
      debounce = setTimeout(() => renderSearch(input.value), 80);
    });

    function renderSearch(raw) {
      const q = raw.trim().toLowerCase();
      if (!q) { results.innerHTML = ''; return; }

      const schedHits = [];
      EVENT.days.forEach((day, di) => {
        day.items.forEach(item => {
          if ([item.title, item.desc, item.note, item.location].join(' ').toLowerCase().includes(q)) {
            schedHits.push({ day, di, item });
          }
        });
      });

      const tipHits = (EVENT.tips || []).filter(t =>
        t.keywords.some(k => k.toLowerCase().includes(q) || q.includes(k.toLowerCase())) ||
        (t.title + ' ' + t.desc).toLowerCase().includes(q)
      );

      const attHits = (EVENT.attendees || []).filter(a =>
        `${a.name} ${a.title} ${a.division} ${a.team}`.toLowerCase().includes(q)
      );

      const actHits = (EVENT.activities || []).filter(a =>
        `${a.title} ${a.desc} ${a.note} ${a.location} ${a.category}`.toLowerCase().includes(q)
      );

      if (!schedHits.length && !tipHits.length && !attHits.length && !actHits.length) {
        results.innerHTML = `<div class="search-empty">
          "<strong>${escHtml(raw)}</strong>" 검색 결과가 없습니다.
        </div>`;
        return;
      }

      const wrap = document.createElement('div');
      wrap.className = 'search-results-inner';

      if (schedHits.length) {
        const lbl = document.createElement('p');
        lbl.className = 'search-section-label';
        lbl.textContent = '일정';
        wrap.appendChild(lbl);

        schedHits.forEach(({ day, di, item }) => {
          const el = document.createElement('div');
          el.className = 'search-result-item';
          el.setAttribute('role', 'button');
          el.setAttribute('tabindex', '0');
          const preview = item.desc ? item.desc.replace(/\n/g,' ').slice(0,60) + (item.desc.length > 60 ? '…' : '') : (item.note || '');
          el.innerHTML = `
            <div class="search-result-meta">
              <span class="search-result-title">${escHtml(item.title)}</span>
              ${preview ? `<span class="search-result-desc">${escHtml(preview)}</span>` : ''}
              <span class="search-result-time">${escHtml(item.time)}</span>
            </div>
            <span class="search-badge ${di === 0 ? 'day1' : 'day2'}">${escHtml(day.label)}</span>`;
          const go = () => { switchDay(di); closeSearch(); };
          el.addEventListener('click', go);
          el.addEventListener('keydown', ev => { if (ev.key === 'Enter') go(); });
          wrap.appendChild(el);
        });
      }

      if (actHits.length) {
        const lbl = document.createElement('p');
        lbl.className = 'search-section-label';
        lbl.textContent = '즐길거리 & 식사';
        wrap.appendChild(lbl);
        actHits.forEach(a => {
          const el = document.createElement('div');
          el.className = 'search-result-item';
          el.setAttribute('role', 'button');
          el.setAttribute('tabindex', '0');
          const preview = a.desc ? a.desc.slice(0,60) + (a.desc.length > 60 ? '…' : '') : '';
          el.innerHTML = `
            <div class="search-result-meta">
              <span class="search-result-title">${escHtml(a.title)}</span>
              ${preview ? `<span class="search-result-desc">${escHtml(preview)}</span>` : ''}
              <span class="search-result-time">${escHtml(a.time)}</span>
            </div>
            <span class="search-badge ${a.day === 0 ? 'day1' : 'day2'}">${a.day === 0 ? 'Day 1' : 'Day 2'}</span>`;
          const go = () => { switchToActivity(a.id); closeSearch(); };
          el.addEventListener('click', go);
          el.addEventListener('keydown', ev => { if (ev.key === 'Enter') go(); });
          wrap.appendChild(el);
        });
      }

      if (attHits.length) {
        const lbl = document.createElement('p');
        lbl.className = 'search-section-label';
        lbl.textContent = '참석자';
        wrap.appendChild(lbl);
        attHits.forEach(a => {
          const el = document.createElement('div');
          el.className = 'search-result-item';
          el.setAttribute('role', 'button');
          el.setAttribute('tabindex', '0');
          const meta = a.team && a.team !== '-' ? `${a.division} · ${a.team}` : a.division;
          el.innerHTML = `
            <div class="search-result-meta">
              <span class="search-result-title">${escHtml(a.name)}</span>
              <span class="search-result-desc">${escHtml(meta)}</span>
            </div>
            <span class="search-badge attendee">${escHtml(a.title)}</span>`;
          const go = () => {
            const roomEntry = (EVENT.accommodation.rooms || []).find(r => r.occupants.includes(a.name));
            const roomNum = roomEntry ? roomEntry.room : '';
            closeSearch();
            switchTab('attendees');
            setTimeout(() => openAttModal(a, roomNum), 80);
          };
          el.addEventListener('click', go);
          el.addEventListener('keydown', ev => { if (ev.key === 'Enter') go(); });
          wrap.appendChild(el);
        });
      }

      if (tipHits.length) {
        const lbl = document.createElement('p');
        lbl.className = 'search-section-label';
        lbl.textContent = '안내';
        wrap.appendChild(lbl);
        tipHits.forEach(t => {
          const el = document.createElement('div');
          el.className = 'search-result-item';
          el.innerHTML = `
            <div class="search-result-meta">
              <span class="search-result-title">${escHtml(t.title)}</span>
              <span class="search-result-desc">${escHtml(t.desc)}</span>
            </div>
            <span class="search-badge tip">안내</span>`;
          wrap.appendChild(el);
        });
      }

      results.innerHTML = '';
      results.appendChild(wrap);
    }

  })();
  </script>

</body>
</html>
