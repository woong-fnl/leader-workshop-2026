<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0D1B2A" />
  <title id="page-title">리더 워크숍 2026</title>
  <meta name="description" id="page-desc" content="리더 워크숍 2026 안내 페이지" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 공지사항 띠 (data.js의 notice가 있을 때만 표시) -->
  <div id="notice-bar" role="status" aria-live="polite"></div>

  <!-- 스킵 내비게이션 (접근성) -->
  <a class="sr-only" href="#main">본문 바로가기</a>

  <!-- 상단 네비게이션 -->
  <header>
    <nav aria-label="주요 메뉴">
      <span class="nav-brand" id="nav-brand">리더 워크숍</span>
      <ul class="nav-links" role="list">
        <li><a href="#schedule">일정</a></li>
        <li><a href="#gallery">갤러리</a></li>
        <li><a href="#videos">영상</a></li>
        <li><a href="#contact">문의</a></li>
      </ul>
    </nav>
  </header>

  <main id="main">

    <!-- ── 히어로 ─────────────────────────────────────────── -->
    <section id="hero" aria-labelledby="hero-title">
      <div class="container hero-inner">
        <p class="hero-kicker">Leader Workshop</p>
        <h1 id="hero-title"><!-- data.js title --></h1>
        <p id="hero-subtitle"><!-- data.js subtitle --></p>

        <!-- 핵심 정보 chip 3개 -->
        <div class="hero-chips" aria-label="행사 정보 요약">

          <span class="chip" id="chip-date">
            <!-- 달력 아이콘 -->
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8"  y1="2" x2="8"  y2="6"/>
              <line x1="3"  y1="10" x2="21" y2="10"/>
            </svg>
            <span><!-- data.js date --></span>
          </span>

          <span class="chip" id="chip-time">
            <!-- 시계 아이콘 -->
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
            <span><!-- data.js time --></span>
          </span>

          <a class="chip" id="chip-venue" href="#" target="_blank" rel="noopener">
            <!-- 위치 아이콘 -->
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
            <span><!-- data.js venue --></span>
          </a>

        </div><!-- .hero-chips -->
      </div>
    </section>

    <!-- ── 일정 타임라인 ───────────────────────────────────── -->
    <section id="schedule" class="section" aria-labelledby="schedule-heading">
      <div class="container">
        <p class="section-label">Schedule</p>
        <h2 class="section-title" id="schedule-heading">세부 일정</h2>

        <!-- Day 탭 -->
        <div class="tab-bar" role="tablist" aria-label="일정 탭" id="day-tabs"></div>

        <!-- Day별 패널 -->
        <div id="day-panels"></div>
      </div>
    </section>

    <hr class="divider" />

    <!-- ── 갤러리 ──────────────────────────────────────────── -->
    <section id="gallery" class="section" aria-labelledby="gallery-heading">
      <div class="container">
        <p class="section-label">Gallery</p>
        <h2 class="section-title" id="gallery-heading">사진 갤러리</h2>
        <div class="gallery-grid" id="gallery-grid">
          <!-- data.js gallery 배열로 동적 생성 -->
        </div>
      </div>
    </section>

    <hr class="divider" />

    <!-- ── 유튜브 영상 ─────────────────────────────────────── -->
    <section id="videos" class="section" aria-labelledby="videos-heading">
      <div class="container">
        <p class="section-label">Videos</p>
        <h2 class="section-title" id="videos-heading">영상</h2>
        <div class="video-list" id="video-list">
          <!-- data.js videos 배열로 동적 생성 -->
        </div>
      </div>
    </section>

    <hr class="divider" />

    <!-- ── 문의처 ──────────────────────────────────────────── -->
    <section id="contact" class="section" aria-labelledby="contact-heading">
      <div class="container">
        <p class="section-label">Contact</p>
        <h2 class="section-title" id="contact-heading">문의처</h2>
        <div class="contact-grid" id="contact-grid">
          <!-- data.js contacts 배열로 동적 생성 -->
        </div>
      </div>
    </section>

  </main>

  <!-- 푸터 -->
  <footer>
    <p><strong id="footer-title">리더 워크숍 2026</strong></p>
    <p id="footer-info"><!-- data.js date · venue --></p>
  </footer>

  <!-- 스크린리더 전용 유틸 -->
  <style>.sr-only { position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; }</style>

  <!-- 데이터 로드 후 렌더링 -->
  <script src="data.js"></script>
  <script>
    (() => {
      const e = id => document.getElementById(id);

      // ── 페이지 메타 ────────────────────────────────────────
      document.title = EVENT.title;
      e('page-title').textContent = EVENT.title;
      e('page-desc').setAttribute('content', `${EVENT.title} — ${EVENT.date} ${EVENT.venue}`);

      // ── 공지사항 ────────────────────────────────────────────
      if (EVENT.notice) {
        e('notice-bar').textContent = `📌 ${EVENT.notice}`;
      }

      // ── 네비 브랜드 ─────────────────────────────────────────
      e('nav-brand').textContent = EVENT.title;

      // ── 히어로 ──────────────────────────────────────────────
      e('hero-title').textContent = EVENT.title;

      const subtitle = e('hero-subtitle');
      if (EVENT.subtitle) {
        subtitle.textContent = EVENT.subtitle;
      } else {
        subtitle.remove();
      }

      e('chip-date').querySelector('span').textContent = EVENT.date;
      e('chip-time').querySelector('span').textContent = EVENT.time;

      const venueChip = e('chip-venue');
      venueChip.querySelector('span').textContent = EVENT.venue;
      venueChip.href = `https://map.kakao.com/link/search/${encodeURIComponent(EVENT.address)}`;

      // ── 푸터 ────────────────────────────────────────────────
      e('footer-title').textContent = EVENT.title;
      e('footer-info').textContent = `${EVENT.date}  ·  ${EVENT.venue}`;

      // ── 타임라인 (Day 탭) ────────────────────────────────────
      const tabBar    = e('day-tabs');
      const panelWrap = e('day-panels');

      const TYPE_CLASS = {
        keynote:    'is-keynote',
        activity:   'is-activity',
        networking: 'is-networking',
        break:      'is-break',
        move:       'is-move',
        session:    '',
      };

      function buildTimeline(items) {
        const ol = document.createElement('ol');
        ol.className = 'timeline';
        ol.setAttribute('aria-label', '시간대별 일정');

        items.forEach(item => {
          const li = document.createElement('li');
          li.className = 'timeline-item ' + (TYPE_CLASS[item.type] || '');

          const desc = item.desc
            ? `<p class="tl-desc">${escHtml(item.desc)}</p>`
            : '';

          // 비고 + 장소 링크
          const notePart = item.note
            ? `<span class="tl-note">${escHtml(item.note)}</span>`
            : '';
          const locPart = (item.location && item.locationUrl)
            ? `<a class="tl-location" href="${escAttr(item.locationUrl)}" target="_blank" rel="noopener noreferrer">
                 <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                 ${escHtml(item.location)}
               </a>`
            : (item.location
                ? `<span class="tl-note">${escHtml(item.location)}</span>`
                : '');
          const meta = (notePart || locPart)
            ? `<div class="tl-meta">${notePart}${locPart}</div>`
            : '';

          li.innerHTML = `
            <div class="tl-time" aria-hidden="true">${escHtml(item.time)}</div>
            <div class="tl-body">
              <p class="tl-title">
                <span class="sr-only">${escHtml(item.time)} — </span>
                ${escHtml(item.title)}
              </p>
              ${desc}${meta}
            </div>`;
          ol.appendChild(li);
        });
        return ol;
      }

      EVENT.days.forEach((day, i) => {
        // 탭 버튼
        const btn = document.createElement('button');
        btn.className    = 'tab-btn';
        btn.role         = 'tab';
        btn.setAttribute('aria-selected', i === 0 ? 'true' : 'false');
        btn.setAttribute('aria-controls', `panel-${i}`);
        btn.id           = `tab-${i}`;
        btn.innerHTML    = `<span class="tab-btn-label">${escHtml(day.label)}</span>
                            <span class="tab-btn-date">${escHtml(day.date)}</span>`;
        btn.addEventListener('click', () => switchTab(i));
        tabBar.appendChild(btn);

        // 패널
        const panel = document.createElement('div');
        panel.className = 'tab-panel' + (i === 0 ? ' is-active' : '');
        panel.id        = `panel-${i}`;
        panel.setAttribute('role', 'tabpanel');
        panel.setAttribute('aria-labelledby', `tab-${i}`);
        panel.appendChild(buildTimeline(day.items));
        panelWrap.appendChild(panel);
      });

      function switchTab(idx) {
        tabBar.querySelectorAll('.tab-btn').forEach((b, i) => {
          b.setAttribute('aria-selected', i === idx ? 'true' : 'false');
        });
        panelWrap.querySelectorAll('.tab-panel').forEach((p, i) => {
          p.classList.toggle('is-active', i === idx);
        });
      }

      // ── 갤러리 ──────────────────────────────────────────────
      const grid = e('gallery-grid');
      if (EVENT.gallery.length === 0) {
        grid.closest('section').style.display = 'none';
      } else {
        EVENT.gallery.forEach(photo => {
          const div = document.createElement('div');
          div.className = 'gallery-item';

          const img = document.createElement('img');
          img.alt = photo.alt;
          img.loading = 'lazy';
          img.decoding = 'async';

          // 이미지 로드 실패 시 플레이스홀더 표시
          img.onerror = () => {
            div.innerHTML = `<div class="gallery-placeholder">사진 준비 중</div>`;
          };
          img.src = photo.src;

          div.appendChild(img);

          if (photo.caption) {
            const cap = document.createElement('p');
            cap.className = 'gallery-caption';
            cap.textContent = photo.caption;
            div.appendChild(cap);
          }

          grid.appendChild(div);
        });
      }

      // ── 유튜브 영상 ─────────────────────────────────────────
      const videoList = e('video-list');
      const validVideos = EVENT.videos.filter(v => v.youtubeId && v.youtubeId.trim() !== '');
      if (validVideos.length === 0) {
        videoList.closest('section').style.display = 'none';
      } else {
        validVideos.forEach(video => {
          const wrap = document.createElement('div');
          wrap.className = 'video-item';

          const titleEl = document.createElement('p');
          titleEl.className = 'video-title';
          titleEl.textContent = video.title;

          const embedWrap = document.createElement('div');
          embedWrap.className = 'video-embed-wrap';

          const iframe = document.createElement('iframe');
          iframe.src = `https://www.youtube.com/embed/${escAttr(video.youtubeId)}`;
          iframe.title = video.title;
          iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
          iframe.allowFullscreen = true;
          iframe.loading = 'lazy';

          embedWrap.appendChild(iframe);
          wrap.appendChild(titleEl);
          wrap.appendChild(embedWrap);
          videoList.appendChild(wrap);
        });
      }

      // ── 문의처 ──────────────────────────────────────────────
      const contactGrid = e('contact-grid');
      EVENT.contacts.forEach(c => {
        const card = document.createElement('div');
        card.className = 'contact-card';

        const phoneHtml = c.phone
          ? `<p class="contact-detail">
               <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12.1 19.36 19.36 0 0 1 1.64 3.5 2 2 0 0 1 3.62 1.5h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.1a16 16 0 0 0 6 6l.86-.86a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
               <a href="tel:${escAttr(c.phone.replace(/\D/g,''))}">${escHtml(c.phone)}</a>
             </p>`
          : '';

        card.innerHTML = `
          <p class="contact-name">${escHtml(c.name)}</p>
          <p class="contact-role">${escHtml(c.role)}</p>
          <p class="contact-detail">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <a href="mailto:${escAttr(c.email)}">${escHtml(c.email)}</a>
          </p>
          ${phoneHtml}`;
        contactGrid.appendChild(card);
      });

      // ── XSS 방지 헬퍼 ───────────────────────────────────────
      function escHtml(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }
      function escAttr(str) {
        return String(str).replace(/[^a-zA-Z0-9_\-\.]/g, c =>
          `&#${c.charCodeAt(0)};`);
      }

    })();
  </script>

</body>
</html>
