<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0F2238" />
  <title>2026 에프앤엘 리더십 워크숍</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="notice-bar" role="status"></div>

  <!-- ══ 사이드바 (데스크탑) ══════════════════════════════════ -->
  <aside class="sidebar" aria-label="내비게이션">

    <!-- 로고: images/logo.png 넣으면 자동 표시, 없으면 텍스트 -->
    <a class="sidebar-logo" href="#top" aria-label="홈">
      <img src="images/logo.png" alt="에프앤엘" class="sidebar-logo-img"
           onerror="this.hidden=true;this.nextElementSibling.hidden=false">
      <span class="sidebar-logo-text" hidden>에프앤엘</span>
    </a>

    <!-- Day 탭 (JS가 렌더링) -->
    <nav class="sidebar-nav" id="sidebar-tabs" role="tablist" aria-label="날짜 선택"></nav>

    <hr class="sidebar-hr" />

    <!-- 검색 -->
    <button class="sidebar-search-btn" id="search-open-btn" aria-label="검색 열기">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      검색
    </button>

  </aside>

  <!-- ══ 하단 탭바 (모바일) ═══════════════════════════════════ -->
  <nav class="mobile-tabs" id="mobile-tabs" aria-label="날짜 선택"></nav>

  <!-- ══ 검색 오버레이 ════════════════════════════════════════ -->
  <div class="search-overlay" id="search-overlay" role="search" aria-label="일정 검색">
    <div class="search-top-bar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input class="search-input" id="search-input" type="search"
             placeholder="검색 (예: 점심, 흡연, 포유포레, 이동)"
             autocomplete="off" aria-label="검색어 입력" />
      <button class="search-close-btn" id="search-close-btn" aria-label="검색 닫기">✕</button>
    </div>
    <div class="search-results" id="search-results" aria-live="polite"></div>
  </div>

  <!-- ══ 메인 콘텐츠 ══════════════════════════════════════════ -->
  <main id="top">

    <section id="hero">
      <div class="hero-inner">

        <!-- 모바일 전용 로고 -->
        <div class="hero-logo-mobile" aria-hidden="true">
          <img src="images/logo.png" alt="" class="hero-logo-mobile-img"
               onerror="this.hidden=true;this.nextElementSibling.hidden=false">
          <span class="hero-logo-mobile-text" hidden>에프앤엘</span>
        </div>

        <p class="hero-kicker">FNL Leadership Workshop</p>
        <h1 class="hero-title" id="hero-title"></h1>
        <p class="hero-subtitle" id="hero-subtitle"></p>

        <div class="hero-chips">
          <span class="chip" id="chip-date">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8"  y1="2" x2="8"  y2="6"/>
              <line x1="3"  y1="10" x2="21" y2="10"/>
            </svg>
            <span></span>
          </span>
          <span class="chip" id="chip-time">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
            <span></span>
          </span>
          <a class="chip" id="chip-venue" href="#" target="_blank" rel="noopener">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
            <span></span>
          </a>
        </div>

      </div>
    </section>

    <!-- Day 패널 -->
    <div class="day-panels-wrap" id="day-panels"></div>

  </main>

  <footer>
    <p><strong id="footer-title"></strong></p>
    <p id="footer-info"></p>
  </footer>

  <script src="data.js"></script>
  <script>
  (() => {
    /* ── 헬퍼 ─────────────────────────────────────────────── */
    const $ = id => document.getElementById(id);
    const escHtml = s => String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    const escAttr = s => String(s).replace(/[^a-zA-Z0-9_./:?=%&+#-]/g,
      c => `&#${c.charCodeAt(0)};`);

    const PIN_SVG = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
      stroke-linejoin="round" aria-hidden="true">
      <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
      <circle cx="12" cy="10" r="3"/></svg>`;

    /* ── 기본 정보 채우기 ─────────────────────────────────── */
    document.title = EVENT.title;
    if (EVENT.notice) $('notice-bar').textContent = '📌 ' + EVENT.notice;

    $('hero-title').textContent    = EVENT.title;
    $('hero-subtitle').textContent = EVENT.subtitle;
    $('chip-date').querySelector('span').textContent  = EVENT.date;
    $('chip-time').querySelector('span').textContent  = EVENT.time;
    const vc = $('chip-venue');
    vc.querySelector('span').textContent = EVENT.venue;
    vc.href = 'https://map.naver.com/v5/search/' + encodeURIComponent(EVENT.address);

    $('footer-title').textContent = EVENT.title;
    $('footer-info').textContent  = EVENT.date + '  ·  ' + EVENT.venue;

    /* ── 타임라인 빌더 ───────────────────────────────────── */
    const TYPE_CLS = {
      keynote:'is-keynote', activity:'is-activity',
      networking:'is-networking', break:'is-break', move:'is-move',
    };

    function buildTimeline(items) {
      const ol = document.createElement('ol');
      ol.className = 'timeline';
      items.forEach(item => {
        const li = document.createElement('li');
        li.className = 'timeline-item ' + (TYPE_CLS[item.type] || '');
        const desc = item.desc ? `<p class="tl-desc">${escHtml(item.desc)}</p>` : '';
        const note = item.note ? `<span class="tl-note">${escHtml(item.note)}</span>` : '';
        const loc  = item.location && item.locationUrl
          ? `<a class="tl-location" href="${escAttr(item.locationUrl)}"
               target="_blank" rel="noopener noreferrer">
               ${PIN_SVG}${escHtml(item.location)}</a>`
          : item.location
            ? `<span class="tl-note">${escHtml(item.location)}</span>` : '';
        const meta = (note || loc) ? `<div class="tl-meta">${note}${loc}</div>` : '';
        li.innerHTML = `
          <div class="tl-time" aria-hidden="true">${escHtml(item.time)}</div>
          <div class="tl-body">
            <p class="tl-title">
              <span class="sr-only">${escHtml(item.time)} — </span>${escHtml(item.title)}
            </p>${desc}${meta}
          </div>`;
        ol.appendChild(li);
      });
      return ol;
    }

    /* ── Day 탭 & 패널 렌더링 ────────────────────────────── */
    let activeDay = 0;
    const sidebarNav = $('sidebar-tabs');
    const mobileNav  = $('mobile-tabs');
    const panelWrap  = $('day-panels');

    EVENT.days.forEach((day, i) => {

      /* 사이드바 탭 */
      const sbBtn = document.createElement('button');
      sbBtn.className = 'sidebar-day-tab' + (i === 0 ? ' is-active' : '');
      sbBtn.setAttribute('role', 'tab');
      sbBtn.setAttribute('aria-selected', i === 0 ? 'true' : 'false');
      sbBtn.setAttribute('aria-controls', `panel-${i}`);
      sbBtn.id = `sb-tab-${i}`;
      sbBtn.innerHTML = `<span class="sidebar-tab-label">${escHtml(day.label)}</span>
                         <span class="sidebar-tab-date">${escHtml(day.date)}</span>`;
      sbBtn.addEventListener('click', () => switchDay(i));
      sidebarNav.appendChild(sbBtn);

      /* 모바일 탭 */
      const mbBtn = document.createElement('button');
      mbBtn.className = 'mobile-tab' + (i === 0 ? ' is-active' : '');
      mbBtn.id = `mb-tab-${i}`;
      mbBtn.setAttribute('aria-label', `${day.label} ${day.date}`);
      mbBtn.innerHTML = `
        <svg class="mobile-tab-icon" width="16" height="16" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span class="mobile-tab-label">${escHtml(day.label)}</span>
        <span class="mobile-tab-date">${escHtml(day.date)}</span>`;
      mbBtn.addEventListener('click', () => switchDay(i));
      mobileNav.appendChild(mbBtn);

      /* 패널 */
      const panel = document.createElement('div');
      panel.className = 'day-panel' + (i === 0 ? ' is-active' : '');
      panel.id = `panel-${i}`;
      panel.setAttribute('role', 'tabpanel');
      panel.setAttribute('aria-labelledby', `sb-tab-${i}`);
      const inner = document.createElement('div');
      inner.className = 'day-panel-inner';
      inner.innerHTML = `<div class="day-heading">
        <span class="day-heading-label">${escHtml(day.label)}</span>
        <span class="day-heading-date">${escHtml(day.date)}</span>
      </div>`;
      inner.appendChild(buildTimeline(day.items));
      panel.appendChild(inner);
      panelWrap.appendChild(panel);
    });

    /* 모바일 검색 탭 */
    const mbSearch = document.createElement('button');
    mbSearch.className = 'mobile-tab';
    mbSearch.setAttribute('aria-label', '검색');
    mbSearch.innerHTML = `
      <svg class="mobile-tab-icon" width="16" height="16" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
           stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <span class="mobile-tab-label">검색</span>`;
    mbSearch.addEventListener('click', openSearch);
    mobileNav.appendChild(mbSearch);

    /* ── Day 전환 ────────────────────────────────────────── */
    function switchDay(idx) {
      if (idx === activeDay) return;
      activeDay = idx;
      document.querySelectorAll('.sidebar-day-tab').forEach((b, i) => {
        b.classList.toggle('is-active', i === idx);
        b.setAttribute('aria-selected', i === idx ? 'true' : 'false');
      });
      document.querySelectorAll('[id^="mb-tab-"]').forEach((b, i) => {
        b.classList.toggle('is-active', i === idx);
      });
      document.querySelectorAll('.day-panel').forEach((p, i) => {
        const wasActive = p.classList.contains('is-active');
        p.classList.toggle('is-active', i === idx);
        if (i === idx && !wasActive) {
          p.style.animation = 'none';
          requestAnimationFrame(() => { p.style.animation = ''; });
        }
      });
      // 모바일: 패널 상단으로 스크롤
      if (window.innerWidth < 768) {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    /* ── 검색 ────────────────────────────────────────────── */
    const overlay   = $('search-overlay');
    const input     = $('search-input');
    const results   = $('search-results');
    const openBtn   = $('search-open-btn');
    const closeBtn  = $('search-close-btn');

    function openSearch() {
      overlay.classList.add('is-open');
      input.focus();
    }
    function closeSearch() {
      overlay.classList.remove('is-open');
      input.value = '';
      results.innerHTML = '';
    }

    openBtn.addEventListener('click', openSearch);
    closeBtn.addEventListener('click', closeSearch);
    document.addEventListener('keydown', ev => {
      if (ev.key === 'Escape' && overlay.classList.contains('is-open')) closeSearch();
    });

    let debounce;
    input.addEventListener('input', () => {
      clearTimeout(debounce);
      debounce = setTimeout(() => renderSearch(input.value), 80);
    });

    function renderSearch(raw) {
      const q = raw.trim().toLowerCase();
      if (!q) { results.innerHTML = ''; return; }

      const schedHits = [];
      EVENT.days.forEach((day, di) => {
        day.items.forEach(item => {
          if ([item.title, item.desc, item.note, item.location].join(' ').toLowerCase().includes(q)) {
            schedHits.push({ day, di, item });
          }
        });
      });

      const tipHits = (EVENT.tips || []).filter(t =>
        t.keywords.some(k => k.toLowerCase().includes(q) || q.includes(k.toLowerCase())) ||
        (t.title + ' ' + t.desc).toLowerCase().includes(q)
      );

      if (!schedHits.length && !tipHits.length) {
        results.innerHTML = `<div class="search-empty">
          "<strong>${escHtml(raw)}</strong>" 검색 결과가 없습니다.
        </div>`;
        return;
      }

      const wrap = document.createElement('div');
      wrap.className = 'search-results-inner';

      if (schedHits.length) {
        const lbl = document.createElement('p');
        lbl.className = 'search-section-label';
        lbl.textContent = '일정';
        wrap.appendChild(lbl);

        schedHits.forEach(({ day, di, item }) => {
          const el = document.createElement('div');
          el.className = 'search-result-item';
          el.setAttribute('role', 'button');
          el.setAttribute('tabindex', '0');
          const preview = item.desc ? item.desc.replace(/\n/g,' ').slice(0,60) + (item.desc.length > 60 ? '…' : '') : (item.note || '');
          el.innerHTML = `
            <div class="search-result-meta">
              <span class="search-result-title">${escHtml(item.title)}</span>
              ${preview ? `<span class="search-result-desc">${escHtml(preview)}</span>` : ''}
              <span class="search-result-time">${escHtml(item.time)}</span>
            </div>
            <span class="search-badge ${di === 0 ? 'day1' : 'day2'}">${escHtml(day.label)}</span>`;
          const go = () => { switchDay(di); closeSearch(); };
          el.addEventListener('click', go);
          el.addEventListener('keydown', ev => { if (ev.key === 'Enter') go(); });
          wrap.appendChild(el);
        });
      }

      if (tipHits.length) {
        const lbl = document.createElement('p');
        lbl.className = 'search-section-label';
        lbl.textContent = '안내';
        wrap.appendChild(lbl);
        tipHits.forEach(t => {
          const el = document.createElement('div');
          el.className = 'search-result-item';
          el.innerHTML = `
            <div class="search-result-meta">
              <span class="search-result-title">${escHtml(t.title)}</span>
              <span class="search-result-desc">${escHtml(t.desc)}</span>
            </div>
            <span class="search-badge tip">안내</span>`;
          wrap.appendChild(el);
        });
      }

      results.innerHTML = '';
      results.appendChild(wrap);
    }

  })();
  </script>

</body>
</html>
